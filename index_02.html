<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>晩御飯ルーレット</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(#fceabb, #f8b500);
    text-align: center; color: #333; margin: 0; padding: 10px;
    min-height: 100vh;
  }
  h2 { color: #5d4037; }
  button {
    width: 90%; max-width: 400px; padding: 16px; margin: 8px 0;
    font-size: 18px; font-weight: bold; color: white; border: none;
    border-radius: 12px; background: #ff6a88; box-shadow: 0 4px 0 #cc4b66;
    cursor: pointer; -webkit-appearance: none;
  }
  button:active { transform: translateY(2px); box-shadow: 0 2px 0 #cc4b66; }
  .input-section {
    background: rgba(255, 255, 255, 0.8); margin: 10px auto;
    padding: 15px; border-radius: 12px; max-width: 450px;
  }
  input, select {
    padding: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; margin: 5px;
  }
  .card {
    margin: 10px auto; padding: 15px; max-width: 450px; background: white;
    border-radius: 15px; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: left;
  }
  table { width: 100%; margin-top: 20px; border-collapse: collapse; background: white; font-size: 13px; table-layout: fixed; }
  th, td { border: 1px solid #ddd; padding: 8px 2px; vertical-align: top; }
  th { background: #ffcc70; }
  .del { color: #ff4444; font-size: 11px; text-decoration: underline; cursor: pointer; display: block; margin-top: 5px; }
</style>
</head>
<body>

<h2>🍽 晩御飯ルーレット</h2>
<button id="run-btn">🎯 5日分決める（通常）</button>
<button id="hard-btn" style="background:#ffcc70; color:#5d4037; box-shadow: 0 4px 0 #e6b866;">⚡ 手間料理を含める</button>

<div id="result-display"></div>

<hr>

<div class="input-section">
  <h3>メニュー追加</h3>
  <input type="text" id="in-name" placeholder="料理名">
  <select id="in-type">
    <option value="main">主菜</option>
    <option value="hard">手間主菜</option>
    <option value="side">副菜</option>
    <option value="soup">汁物</option>
  </select>
  <button id="add-btn" style="width:auto; padding:10px 20px; font-size:14px; background:#5d4037; box-shadow:0 3px 0 #3e2723;">追加</button>
</div>

<button id="reset-btn" style="background:#f44336; font-size:12px; width:auto; padding:5px 10px;">⚠️ 初期メニューに戻す</button>

<table>
  <tr><th>主菜</th><th>手間</th><th>副菜</th><th>汁物</th></tr>
  <tr><td id="l-main"></td><td id="l-hard"></td><td id="l-side"></td><td id="l-soup"></td></tr>
</table>

<script>
// 画像から書き起こした全データ
const IMAGES = {
  main: ["アジフライ","エビチリ","エビフライ","エビマヨ","キーマカレー","ささみのフライ","サーモンフライ","サーモンムニエル","しょうが焼き","チキン南蛮","ハンバーグ","ブリ大根","ピーマンの肉詰め","回鍋肉","よだれ鶏","れんこんつくね","春巻き","煮込みハンバーグ","手羽先揚げ","油淋鶏","肉じゃが","肉豆腐","豚カツ","豚の角煮","青椒肉絲","鶏のトマト煮","鶏の照り焼き","ヒレカツ","白身魚フライ"],
  hard: ["コロッケ","グラタン","メンチカツ","スコッチエッグ"],
  side: ["オクラ納豆","きんぴらごぼう","ししゃも","じゃーまんぽてと","チヂミ","ナスの揚げ浸し","ほうれん草の胡麻あえ","ポテトサラダ","マカロニサラダ","大根サラダ","大根と鶏ミンチの煮物","切り干し大根","厚揚げの煮物","小松菜チャプチェ","揚げ出し豆腐","焼き茄子","筑前煮","茶碗蒸し","野菜炒め","鮭塩焼き","鯖の塩焼き","中華サラダ","水菜とじゃこのサラダ","イカとポテト","ブロッコリーサラダ","コールスロー","フランクフルト","れんこんスティック"],
  soup: ["じゃがいもの味噌汁","コンソメスープ","ニラと厚揚げの味噌汁","ミネストローネ","ラタトゥーユ","卵スープ","大根の味噌汁","白菜だんごスープ","白菜の味噌汁","豚汁"]
};

let menu = JSON.parse(localStorage.getItem("dinner_v5")) || JSON.parse(JSON.stringify(IMAGES));

function update() {
  const cats = ['main','hard','side','soup'];
  cats.forEach(c => {
    const td = document.getElementById('l-'+c);
    td.innerHTML = "";
    menu[c].sort((a,b) => a.localeCompare(b, 'ja'));
    menu[c].forEach((item, i) => {
      const div = document.createElement("div");
      div.innerHTML = `${item}<span class="del" onclick="doDel('${c}',${i})">削除</span><br>`;
      td.appendChild(div);
    });
  });
  localStorage.setItem("dinner_v5", JSON.stringify(menu));
}

document.getElementById("add-btn").onclick = () => {
  const name = document.getElementById("in-name").value.trim();
  const type = document.getElementById("in-type").value;
  if(!name) return;
  if(menu[type].includes(name)) { alert("既にあります"); return; }
  menu[type].push(name);
  document.getElementById("in-name").value = "";
  update();
};

window.doDel = (c, i) => {
  if(confirm("消しますか？")) { menu[c].splice(i,1); update(); }
};

function run(mode) {
  const disp = document.getElementById("result-display");
  disp.innerHTML = "抽選中...";
  setTimeout(() => {
    let pool = (mode === 'hard') ? [...menu.main, ...menu.hard] : [...menu.main];
    if(pool.length === 0) return;
    let res = "";
    let shuffled = pool.sort(() => 0.5 - Math.random());
    for(let i=0; i<Math.min(5, shuffled.length); i++) {
      const s = menu.side[Math.floor(Math.random()*menu.side.length)] || "-";
      const so = menu.soup[Math.floor(Math.random()*menu.soup.length)] || "-";
      res += `<div class="card">${i+1}日目: <b>${shuffled[i]}</b><br><small>🥗${s} / 🍲${so}</small></div>`;
    }
    disp.innerHTML = res;
  }, 300);
}

document.getElementById("run-btn").onclick = () => run('normal');
document.getElementById("hard-btn").onclick = () => run('hard');
document.getElementById("reset-btn").onclick = () => {
  if(confirm("初期状態に戻しますか？")) {
    menu = JSON.parse(JSON.stringify(IMAGES));
    update();
  }
};

update();
</script>
</body>
</html>
